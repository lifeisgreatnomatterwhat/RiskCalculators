<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surgical Risk & Benefit Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        .risk-bar { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); height: 28px; border-radius: 6px; }
        .bg-managed { background-color: #10b981; } 
        .bg-unmanaged { background-color: #ef4444; } 
        .bg-baseline { background-color: #94a3b8; } 
    </style>
</head>
<body class="bg-gray-100 font-sans p-4 md:p-12">

    <div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-2xl overflow-hidden border border-gray-200">
        <div class="bg-slate-900 p-8 text-white flex flex-col md:flex-row justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight">Surgical Risk Simulator</h1>
                <p class="text-slate-400 mt-2 text-sm italic">Clinical decision support for gene mutation carriers.</p>
            </div>
            <button onclick="downloadPDF()" class="mt-6 md:mt-0 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-lg shadow-lg transition-all">
                Download Physician Guide
            </button>
        </div>

        <div class="grid md:grid-cols-12">
            <div class="md:col-span-4 bg-slate-50 p-8 border-r border-gray-100">
                <div class="space-y-6">
                    
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2 uppercase tracking-wider">Genetic Mutation</label>
                        <select id="geneSelect" class="w-full p-3 bg-white border-2 border-blue-100 rounded-md font-bold text-blue-700 outline-none focus:border-blue-500 shadow-sm" onchange="runSim()">
                            <option value="BRIP1">BRIP1</option>
                            <option value="RAD51C">RAD51C</option>
                            <option value="RAD51D">RAD51D</option>
                            <option value="BARD1">BARD1</option>
                            <option value="GENERAL">General Population</option>
                        </select>
                    </div>

                    <div id="protocolBox" class="bg-white border-2 border-slate-200 p-4 rounded-xl shadow-sm">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">Clinical Protocol Reference</h4>
                        <div id="protocolContent" class="space-y-2">
                            </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2 uppercase tracking-wider">Age at Surgery</label>
                        <input type="number" id="ageInput" value="45" min="30" max="65" class="w-full p-3 bg-white border-2 border-gray-200 rounded-md font-bold text-lg outline-none focus:border-blue-500 shadow-sm" onchange="runSim()">
                    </div>

                    <div class="space-y-4 pt-4 border-t border-slate-200">
                        <label class="flex items-center space-x-3 cursor-pointer group">
                            <input type="checkbox" id="surgToggle" class="w-5 h-5 text-blue-600 rounded" onchange="runSim()">
                            <span class="font-medium text-gray-700 group-hover:text-blue-600 transition">Surgery: Path B (Hyst+BSO)</span>
                        </label>
                        <label class="flex items-center space-x-3 cursor-pointer group">
                            <input type="checkbox" id="hrtToggle" class="w-5 h-5 text-blue-600 rounded" onchange="runSim()">
                            <span class="font-medium text-gray-700 group-hover:text-blue-600 transition">Mitigation: Estrogen HRT</span>
                        </label>
                        <label class="flex items-center space-x-3 cursor-pointer group">
                            <input type="checkbox" id="exToggle" class="w-5 h-5 text-blue-600 rounded" onchange="runSim()">
                            <span class="font-medium text-gray-700 group-hover:text-blue-600 transition">Mitigation: Lifting Weights</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="md:col-span-8 p-8 md:p-12">
                <h3 class="text-gray-500 uppercase tracking-widest text-[10px] font-black mb-8">Absolute Risk (per 100 Women by Age 65)</h3>
                <div class="space-y-10" id="bars">
                    </div>

                <div id="strategy-box" class="mt-12 p-6 rounded-xl border-l-8 border-blue-500 bg-blue-50 text-blue-900 shadow-sm">
                    <p id="insight-text" class="italic text-sm leading-relaxed"></p>
                </div>
            </div>
        </div>

        <div class="bg-gray-50 border-t border-gray-200 p-4 text-center">
            <p class="text-[9px] text-gray-400 uppercase tracking-widest font-bold">
                NCCN v1.2026 | Kotsopoulos 2025 | PROMPT Registry Updates | Not Medical Advice
            </p>
        </div>
    </div>

    <script>
        const GENE_DATA = {
            "BRIP1": { risk: 10, range: "5-15%", age: "45-50", surg: "RRSO (BSO)" },
            "
