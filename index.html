<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surgical Strategy Table v1.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">

    <div class="max-w-6xl mx-auto bg-white shadow-xl rounded-xl overflow-hidden border border-slate-200">
        <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
            <h1 class="text-xl font-bold">Clinical Comparison Table</h1>
            <div class="flex space-x-4">
                <select id="geneSelect" class="bg-slate-800 p-2 rounded text-blue-400 font-bold" onchange="updateTable()">
                    <option value="BRIP1">BRIP1</option>
                    <option value="RAD51C">RAD51C</option>
                    <option value="RAD51D">RAD51D</option>
                </select>
                <input type="number" id="ageInput" value="45" class="bg-slate-800 p-2 rounded text-white w-16" onchange="updateTable()">
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-[10px] uppercase bg-slate-100 text-slate-500 border-b">
                        <th class="p-4">Category</th>
                        <th class="p-4 bg-orange-50 text-orange-800">No Surgery</th>
                        <th class="p-4">Path A (BSO)</th>
                        <th class="p-4 bg-blue-50 text-blue-800 font-bold">Path B (Hyst+BSO)</th>
                        <th class="p-4">Impact</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-sm">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        function updateTable() {
            const gene = document.getElementById('geneSelect').value;
            const age = document.getElementById('ageInput').value;
            const risks = { "BRIP1": 10, "RAD51C": 12, "RAD51D": 13 };
            const oRisk = risks[gene];

            const rows = [
                ["Ovarian Cancer", `${oRisk}/100`, "<1/100", "<1/100", `-${oRisk-1} Cases`],
                ["Breast Cancer", "13/100", "13.5/100", "12.9/100", "-0.6 vs Path A"],
                ["Bone Fracture", "5/100", "12/100", "12/100", "Managed via HRT"],
                ["Heart Disease", "12/100", "14/100", "13/100", "Protected via HRT"]
            ];

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; // Clear previous

            rows.forEach(r => {
                tbody.innerHTML += `
                    <tr class="border-b border-slate-100">
                        <td class="p-4 font-bold text-slate-800">${r[0]}</td>
                        <td class="p-4 bg-orange-50/50 text-orange-900">${r[1]}</td>
                        <td class="p-4 text-slate-600">${r[2]}</td>
                        <td class="p-4 bg-blue-50/50 text-blue-700 font-black">${r[3]}</td>
                        <td class="p-4 text-green-700 font-bold">${r[4]}</td>
                    </tr>`;
            });
        }
        // Run immediately on load
        window.onload = updateTable;
    </script>
</body>
</html>
