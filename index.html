<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surgical Risk & Strategy Simulator v1.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .impact-cell { color: #059669; font-weight: 800; background-color: #f0fdf4; }

        tr:hover { background-color: #f8fafc; }
    </style>
</head>

        <div class="bg-slate-900 p-6 text-white flex flex-col md:flex-row justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">Surgical Risk & Strategy Simulator</h1>
                <p class="text-slate-400 text-sm mt-1">Full Path Comparison: Surveillance vs. Path A vs. Path B</p>
            </div>
            <div class="flex space-x-4 mt-4 md:mt-0">
                <div class="bg-slate-800 px-4 py-2 rounded border border-slate-700">
                    <label class="text-[10px] uppercase font-black text-slate-500 block">Mutation</label>
                    <select id="geneSelect" class="bg-transparent text-blue-400 font-bold outline-none" onchange="updateTable()">
                        <option value="BRIP1">BRIP1</option>
                        <option value="RAD51C">RAD51C</option>
                        <option value="RAD51D">RAD51D</option>
                        <option value="BARD1">BARD1</option>
                    </select>
                </div>
                <div class="bg-slate-800 px-4 py-2 rounded border border-slate-700">
                    <label class="text-[10px] uppercase font-black text-slate-500 block">Current Age</label>
                    <input type="number" id="ageInput" value="45" class="bg-transparent text-white font-bold w-12 outline-none" onchange="updateTable()">
                </div>
            </div>
        </div>

        <div class="overflow-x-auto p-4 md:p-6">
            <table class="w-full text-left border-collapse min-w-[1100px]">
                <thead>
                    <tr class="text-[11px] uppercase tracking-wider text-slate-500 border-b-2 border-slate-100">
                        <th class="pb-4 pl-2 font-black">Health Category</th>
                        <th class="pb-4 font-black">Benchmark (General Pop)</th>
                        <th class="pb-4 font-black text-orange-700 bg-orange-50 px-4 rounded-t-lg">No Surgery (Surveillance)</th>
                        <th class="pb-4 font-black">Path A: BSO (+Combined HRT)</th>
                        <th class="pb-4 font-black text-blue-700 bg-blue-50 px-4 rounded-t-lg">Path B: Total Hyst (+E-Only HRT)</th>
                        <th class="pb-4 font-black text-center">Net Mitigation Impact</th>
                        <th class="pb-4 font-black pl-4">Clinical Source</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-sm">
                    </tbody>
            </table>
        </div>
